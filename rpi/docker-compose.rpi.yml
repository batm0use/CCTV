services:
  cctv-main:
    build: .
    command: python3 manage.py run-main
    restart: unless-stopped
    privileged: true
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      - footage_data:/var/lib/cctv/footage
      - state_data:/var/lib/cctv
      - ./cctv.conf:/app/cctv.conf:ro
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1

  cctv-storage:
    build: .
    command: python3 manage.py run-storage
    restart: unless-stopped
    depends_on:
      - cctv-main
    volumes:
      - footage_data:/var/lib/cctv/footage
      - state_data:/var/lib/cctv
      - ./cctv.conf:/app/cctv.conf:ro
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  footage_data:
  state_data:

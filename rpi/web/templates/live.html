{% extends "base.html" %}
{% block title %}Live — CCTV{% endblock %}
{% block head %}
<style>
  html, body { height: 100vh; overflow: hidden; }
  body { display: flex; flex-direction: column; }
  main { flex: 1; padding: 0; display: flex; overflow: hidden; }
  .stream-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
  .stream-container img { max-width: 100%; max-height: 100%; display: block; border: 1px solid #222; }
</style>
{% endblock %}
{% block content %}
<div class="stream-container">
  <img src="/stream.mjpeg" alt="Live feed">
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Live — CCTV{% endblock %}
{% block head %}
<style>
  html { height: 100%; }
  body { height: 100%; display: grid; grid-template-rows: auto 1fr; overflow: hidden; }
  main { padding: 0; overflow: hidden; }
  .stream-container { height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
  .stream-container img { width: 100%; height: 100%; object-fit: contain; display: block; }
</style>
{% endblock %}
{% block content %}
<div class="stream-container">
  <img src="/stream.mjpeg" alt="Live feed">
</div>
{% endblock %}

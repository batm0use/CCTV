<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CCTV{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }
    nav { display: flex; gap: 1.5rem; padding: 0.75rem 1.5rem; background: #1a1a1a; border-bottom: 1px solid #333; }
    nav a { color: #ccc; text-decoration: none; font-size: 0.9rem; }
    nav a:hover, nav a.active { color: #fff; }
    main { padding: 1.5rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/live" {% if active == 'live' %}class="active"{% endif %}>Live</a>
    <a href="/footage" {% if active == 'footage' %}class="active"{% endif %}>Footage</a>
    <a href="/api/status">Status</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

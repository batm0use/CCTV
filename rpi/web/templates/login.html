<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CCTV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
                  padding: 2rem; width: 100%; max-width: 340px; }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }
    label { display: block; font-size: 0.82rem; color: #999; margin-bottom: 0.3rem; }
    input { display: block; width: 100%; padding: 0.5rem 0.65rem; margin-bottom: 1rem;
            background: #111; border: 1px solid #333; border-radius: 4px;
            color: #eee; font-size: 0.9rem; }
    input:focus { outline: none; border-color: #555; }
    button { width: 100%; padding: 0.55rem; background: #2a2a2a; color: #eee;
              border: 1px solid #3a3a3a; border-radius: 4px; font-size: 0.9rem;
              cursor: pointer; margin-top: 0.25rem; }
    button:hover { background: #333; }
    .error { font-size: 0.82rem; color: #e08888; margin-bottom: 1rem;
              padding: 0.4rem 0.6rem; background: #2a1a1a; border: 1px solid #4a2a2a;
              border-radius: 4px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>CCTV</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
